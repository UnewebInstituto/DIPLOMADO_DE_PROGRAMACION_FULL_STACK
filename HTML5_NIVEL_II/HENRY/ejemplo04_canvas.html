<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/ejemplo04_canvas.css">
</head>
<body>
  <h1>Ejemplo04 Canvas</h1>
  <a href="https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API" target="_blank">Referencia documentación Canvas</a>
  <hr>
  <a href="./ejemplo03.html">Regresar al menú</a>
  <hr>
  <button onclick="dibujar()">Ejecutar canvas</button>
  <hr>
  <canvas id="lienzo"></canvas>

  <script>
    // Declaración de variables
    var canvas = document.getElementById('lienzo');
    var ctx = canvas.getContext('2d');
    const colores = ['yellow','blue','red','green','purple','orange'];
    console.log(ctx);
    function dibujar(){
      let i = 0;
      let x = 0;
      let y = 0;
      while (i < 6){
        ctx.fillStyle = colores[i];
        console.log(ctx.fillStyle);
        console.log('x:',x);
        console.log('y:',y);
        ctx.fillRect(x, y, 100, 100);
        x = x + 100;
        console.log(x);
        y = y + 100;
        console.log(y);
        i = i + 1;
        console.log(i);
      }
    }

  </script>
</body>
</html>
