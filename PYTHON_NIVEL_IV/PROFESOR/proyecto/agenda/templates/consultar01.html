{% include 'encabezado.html' %}
<h3>Consultar contacto</h3>
<div>
  <div class="row">
      <div class="mb-3 col">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" value="{{nombre}}" readonly>
      </div>
      <div class="mb-3 col">
        <label for="apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="apellido" name="apellido" value="{{apellido}}" readonly>
      </div>
  </div>
  <div class="row">
      <div class="mb-3 col">
        <label for="correo_electronico" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" name="email" value="{{email}}" readonly>
      </div>
      <div class="mb-3 col">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="telefono" name="telefono" value="{{telefono}}" readonly>
      </div>
  </div>
  <div class="row">
     <div class="mb-3">
        <label for="direccion" class="form-label">Dirección</label>
        <textarea name="direccion" id="direccion" class="form-control" style="resize:none" readonly>{{direccion}}</textarea>
      </div>
  </div>
  <button type="submit" class="btn btn-primary">Enviar</button>
</div>
{% include 'pie.html' %}
